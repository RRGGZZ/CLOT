fabric:
  _target_: lightning.fabric.Fabric
  _convert_: all
  accelerator: gpu
  devices: ${ngpu}
  num_nodes: ${nodes}
  strategy:
    _target_: lightning.fabric.strategies.DDPStrategy
  precision: ${amp_precision}
  loggers:
  - _target_: lightning.fabric.loggers.TensorBoardLogger
    root_dir: ${save_dir}
ngpu: 4
nodes: 1
torch_deterministic: false
amp_precision: 16-mixed
force_flat_terrain: false
eval_overrides:
  ngpu: 1
  nodes: 1
  fabric:
    loggers: null
  headless: false
  num_envs: 1
  auto_load_latest: false
  use_wandb: false
  env:
    config:
      max_episode_length_s: 100000
seed: 1
codebase_version: 1.0
headless: true
num_envs: 4096
auto_load_latest: false
checkpoint: logs/mjlab-amp-transformer/20260122_154738-train-transformer-amp-0120-motion_tracking-adam_pro/model_126000.pt
project_name: mjlab-amp-transformer
experiment_name: train-adam-amp-transformer
base_dir: logs
timestamp: ${now:%Y%m%d_%H%M%S}
experiment_dir: ${base_dir}/${project_name}/${timestamp}-${experiment_name}-${log_task_name}-${robot.asset.robot_type}
save_dir: ${experiment_dir}/.hydra
use_wandb: true
log_task_name: motion_tracking
sim_type: isaacgym
env_spacing: 20
output_dir: ${experiment_dir}/output
algo:
  _target_: humanoidverse.agents.mh_ppo_amp.mh_ppo_amp.AMP
  _recursive_: false
  config:
    num_learning_epochs: 5
    num_mini_batches: 4
    clip_param: 0.2
    gamma: 0.99
    lam: 0.95
    value_loss_coef: 1.0
    entropy_coef: 0.01
    l2c2:
      enable: false
      lambda_value: 1.0
      lambda_policy: 0.1
    actor_learning_rate: 0.001
    critic_learning_rate: 0.001
    discriminator_learning_rate: 0.0001
    max_grad_norm: 1.0
    use_clipped_value_loss: true
    schedule: adaptive
    desired_kl: 0.01
    num_steps_per_env: 24
    save_interval: 1000
    logging_interval: 25
    load_optimizer: true
    init_noise_std: 0.8
    num_learning_iterations: 1000000
    init_at_random_ep_len: true
    eval_callbacks: null
    discriminator_weight_decay: 0.0001
    discriminator_logit_weight_decay: 0.01
    discriminator_batch_size: 4096
    discriminator_mini_batches: 2
    discriminator_reward_w: 0.05
    discriminator_grad_penalty: 5
    discriminator_replay_keep_prob: 0.01
    discriminator_replay_size: 100000
    discriminator_learning_epochs: 3
    phase_embed:
      type: Original
      dim: 16
    module_dict:
      actor:
        type: Transformer
        input_dim:
        - actor_obs
        output_dim:
        - robot_action_dim
        net_config:
          d_model: 192
          num_heads: 4
          d_ff: 768
          num_layers: 3
          max_seq_length: 200
      critic:
        type: Transformer
        input_dim:
        - critic_obs
        output_dim:
        - num_rew_fn
        net_config:
          d_model: 192
          num_heads: 4
          d_ff: 768
          num_layers: 3
          max_seq_length: 200
    discriminator:
      _target_: humanoidverse.agents.modules.amp_discriminator.Discriminator
      _recursive_: false
      num_out: 1
      config:
        obs_key: historical_self_obs
        input_dim_names:
        - amp_obs
        normalize_obs: true
        norm_clamp_value: 5
        layers:
        - units: 1024
          activation: relu
          use_layer_norm: false
        - units: 1024
          activation: relu
          use_layer_norm: false
        - units: 1024
          activation: relu
          use_layer_norm: false
        - units: 1024
          activation: relu
          use_layer_norm: false
env:
  _target_: humanoidverse.envs.motion_tracking.motion_tracking.LeggedRobotMotionTracking
  _recursive_: false
  config:
    experiment_name: ${experiment_name}
    num_envs: ${num_envs}
    headless: ${headless}
    simulator: ${simulator}
    save_rendering_dir: null
    ckpt_dir: null
    robot: ${robot}
    domain_rand: ${domain_rand}
    rewards: ${rewards}
    terrain: ${terrain}
    obs: ${obs}
    env_spacing: 5.0
    max_episode_length_s: 100000
    use_vec_reward: true
    normalization:
      clip_actions: 100.0
      clip_observations: 100.0
    termination:
      terminate_when_close_to_dof_pos_limit: false
      terminate_when_close_to_dof_vel_limit: false
      terminate_when_close_to_torque_limit: false
      terminate_by_contact: false
      terminate_by_gravity: true
      terminate_by_low_height: false
      terminate_when_motion_end: true
      terminate_when_motion_far: true
      terminate_when_dof_far: false
    termination_scales:
      termination_close_to_dof_pos_limit: 0.98
      termination_close_to_dof_vel_limit: 0.98
      termination_close_to_torque_limit: 0.98
      termination_min_base_height: 0.2
      termination_gravity_x: 0.8
      termination_gravity_y: 0.8
      termination_gravity: 0.75
      termination_scale: true
      termination_motion_far_threshold: 2.5
    use_transformer: depend on algo
    use_end_time_ratio: false
    termination_probality:
      terminate_when_close_to_dof_pos_limit: 0.25
      terminate_when_close_to_dof_vel_limit: 0.25
      terminate_when_close_to_torque_limit: 0.25
    termination_curriculum:
      terminate_when_motion_far_curriculum: true
      terminate_when_motion_far_initial_threshold: 2.5
      terminate_when_motion_far_threshold_max: 3.0
      terminate_when_motion_far_threshold_min: 2.5
      terminate_when_motion_far_curriculum_degree: 3.0e-06
      terminate_when_motion_far_curriculum_level_down_threshold: 0.2
      terminate_when_motion_far_curriculum_level_up_threshold: 0.95
      termination_scale_curriculum: true
      termination_scale_initial_value: 1.0
      termination_scale_value_max: 4.0
      termination_scale_value_min: 0.8
      termination_scale_curriculum_degree: 1.0e-05
      termination_scale_curriculum_level_down_threshold: 0.2
      termination_scale_curriculum_level_up_threshold: 0.92
      terminate_when_dof_far_curriculum:
        enable: true
        init: 3.0
        max: 3.0
        min: 1.0
        degree: 2.0e-06
        level_down_threshold: 0.2
        level_up_threshold: 0.95
    resample_motion_when_training: true
    resample_time_interval_s: 1000
    noise_to_initial_level: 0
    init_noise_scale:
      dof_pos: 0.1
      dof_vel: 0.15
      root_pos: 0.05
      root_rot: 10
      root_vel: 0.01
      root_ang_vel: 0.01
    use_teleop_control: false
    enforce_randomize_motion_start_eval: false
    soft_dynamic_correction:
      enable: false
      alpha: 0.1
      type: deter
      curriculum:
        enable: true
        max_alpha: 0.9
        min_alpha: 0.0
        degree: 1.0e-05
        level_down_threshold: 0.2
        level_up_threshold: 0.98
