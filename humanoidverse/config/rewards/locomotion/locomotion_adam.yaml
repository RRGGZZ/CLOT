      # feet_position = 0.2
      # base pos
      default_joint_pos: 0.5 # 0.2
      default_arm: 0.5 # 0.5
      default_torso: 0.5
      orientation: 1.
      torso_orientation: 1.0
      base_height: 0.2 # 0.2 # 1.0
      base_acc: 0.2
      # energy
      action_smoothness: -1. # -0.02, 1.5
      torques: -1e-4  #-1e-5
      dof_vel: -1e-3 #-5e-4
      dof_acc: -1e-6 # -1e-7
      collision: -10.
  


