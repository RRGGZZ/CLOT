# @package _global_

rewards:
  set_reward: Tengjie
  set_reward_date: 20251015
  only_positive_rewards: False
  reward_scales:
      joint_pos: 1.6 # 1.6
      feet_clearance: 1.  #0.
      feet_contact_number: 1.2  # 2
      # gait
      feet_air_time: 1. # 0.
      foot_slip: -0.05 # -0.05
      feet_distance: 0. # 0.
      knee_distance: 0. # 0.
      # contact
      feet_contact_forces: -0.1 # -0.1
      # vel tracking
      tracking_lin_vel: 1.2
      tracking_ang_vel: 1.1
      vel_mismatch_exp: 0.5  # lin_z; ang x,y
      low_speed: 0.2
      track_vel_hard: 0.5
      # gait
      gait_feet_distance: 0.5 # 0.2
      gait_swing_symmetric: 0.
      feet_orien_forward: 0.5  #0.5
