  command_min_value: 0.0
  command_curriculum_degree: 0.00005
  command_curriculum_level_down_threshold: 400
  command_curriculum_level_up_threshold: 700

  reward_penalty_reward_names : [
    "foot_slip",
    "action_smoothness",
    "dof_acc",
    "feet_contact_forces",
    "torques",
    "dof_vel",
    "default_torso"
  ]