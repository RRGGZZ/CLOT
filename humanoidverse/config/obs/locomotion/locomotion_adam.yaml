# @package _global_

# Modified from 'deepmimic_a2c_nolinvel_LARGEnoise_history.yaml', add priv information to critic

# Be careful when using _raw, history
obs:
  obs_dict:
    actor_obs: [
      commands,
      base_ang_vel,
      projected_gravity,
      dof_pos,
      dof_vel,
      # avg_yaw_vel,
      gait_phase,
      actions,
      history_actor
    ]

    critic_obs: [
      commands,
      base_ang_vel,
      projected_gravity,
      dof_pos,
      dof_vel,
      actions,
      dr_base_com,
      dr_link_mass,
      dr_kp,
      dr_kd,
      dr_friction,
      dr_ctrl_delay,
      # stance_mask,
      # contact_mask,
      history_critic
    ]

  obs_auxiliary: # define those coumpounds in obs_dict, for example, you can define different long/short history with different length

    history_actor: {
      base_ang_vel: 4,
      projected_gravity: 4,
      dof_pos: 4,
      dof_vel: 4,
      actions: 4,
      # ref_motion_phase: 4
    }

    history_critic: {
      base_ang_vel: 4,
      projected_gravity: 4,
      dof_pos: 4,
      dof_vel: 4,
      actions: 4,
      # ref_motion_phase: 4
    }

  obs_scales: {
    commands: 1.0,
    root_height: 1.0,
    base_lin_vel: 0.5,
    base_ang_vel: 0.25,
    avg_yaw_vel: 0.25,
    gait_phase: 1.0,
    stance_mask: 1.0,
    contact_mask: 1.0,
    base_quat: 1.0,
    projected_gravity: 1.0,
    dof_pos: 1.0,
    dof_vel: 0.05,
    actions: 1.0,
    local_body_pos: 1.0,
    local_body_vel: 1.0,
    local_body_rot: 1.0,
    local_body_rot_vel: 1.0,
    dif_local_rigid_body_pos: 1.0,
    local_ref_rigid_body_pos: 1.0,
    # ref_motion_phase: 1.0,
    future_local_ref_body_pos_extend: 1.0,
    future_dif_local_rigid_body_pos: 1.0,
    history_actor: 1.0,
    history_critic: 1.0,
    dr_base_com: 1.0,
    dr_link_mass: 1.0,
    dr_kp: 1.0,
    dr_kd: 1.0,
    dr_friction: 1.0,
    dr_ctrl_delay: 1.0,
    dr_motor_strength: 1.0
  }

  noise_scales: {
    commands: 0.0,
    root_height: 0.05,
    base_lin_vel: 0.2,
    base_ang_vel: 0.3,
    base_quat: 0.05,   #有全局测量的情况下，这个值小一点
    projected_gravity: 0.1,  #0.2 有全局测量的情况下，这个值小一点
    dof_pos: 0.01,
    dof_vel: 1.0,
    actions: 0.0,
    local_body_pos: 0.0,
    local_body_vel: 0.0,
    local_body_rot: 0.0,
    local_body_rot_vel: 0.0,
    dif_local_rigid_body_pos: 0.05,
    local_ref_rigid_body_pos: 0.05,
    # ref_motion_phase: 0.0,
    future_local_ref_body_pos_extend: 0.05,
    future_dif_local_rigid_body_pos: 0.05,
    history_actor: 0.0,
    history_critic: 0.0,
    dr_base_com: 0.0,
    dr_link_mass: 0.0,
    dr_kp: 0.0,
    dr_kd: 0.0,
    dr_friction: 0.0,
    dr_ctrl_delay: 0.0,
    dr_motor_strength: 0.0,
    avg_yaw_vel: 0.3,
    gait_phase: 0.0,
    stance_mask: 0.0,
    contact_mask: 0.0,
  }

  add_noise_currculum: True
  noise_initial_value: 0.1
  noise_value_max: 1.0
  noise_value_min: 0.0
  soft_dof_pos_curriculum_degree: 0.00005
  soft_dof_pos_curriculum_level_down_threshold: 500 #200
  soft_dof_pos_curriculum_level_up_threshold: 750 #750

  obs_dims:
    - commands: 3
    - avg_yaw_vel: 1.0
    - gait_phase: 2
    - stance_mask: 2
    - contact_mask: 2
    - base_lin_vel: 3
    - base_ang_vel: 3
    - base_quat: 4 
    - root_height: 1
    - projected_gravity: 3
    - dof_pos: ${robot.dof_obs_size}
    - dof_vel: ${robot.dof_obs_size}
    - actions: ${robot.dof_obs_size}
    - dif_local_rigid_body_pos: ${eval:'3 * ${robot.num_bodies} + 15'} # hardcoded for 3 extended body
    - local_ref_rigid_body_pos: ${eval:'3 * ${robot.num_bodies} + 15'}
    - local_body_pos: ${eval:'3 * ${robot.num_bodies} + 15'}
    - local_body_vel: ${eval:'3 * ${robot.num_bodies} + 15'}
    - local_body_rot: ${eval:'4 * ${robot.num_bodies} + 20'}
    - local_body_rot_vel: ${eval:'3 * ${robot.num_bodies} + 15'}
    - ref_motion_phase: 1
    - dr_base_com: 3
    - dr_link_mass: 17 # = num of 'randomize_link_body_names'
    - dr_kp: ${robot.dof_obs_size}
    - dr_kd: ${robot.dof_obs_size}
    - dr_friction: 1
    - dr_ctrl_delay: 1
    - dr_motor_strength: ${robot.dof_obs_size}
    - future_local_ref_body_pos_extend: ${eval:'${obs.future_ref_steps} * (3 * ${robot.num_bodies} + 15)'}
    - future_dif_local_rigid_body_pos: ${eval:'${obs.future_ref_steps} * (3 * ${robot.num_bodies} + 15)'}
  post_compute_config: {} # Will store values after preprocessing, don't put anything here
  motion_len: -1
  future_ref_steps: 10