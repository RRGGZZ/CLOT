# @package _global_

# Modified from 'deepmimic_a2c_nolinvel_LARGEnoise_history.yaml', add priv information to critic

# Be careful when using _raw, history
obs:
  obs_dict:
    actor_obs: [
      # base_lin_vel,
      base_ang_vel,
      projected_gravity,
      # base_quat,
      dof_pos,
      dof_vel,
      actions,
      # ref_motion_phase,
      # dif_local_rigid_body_pos,
      # local_ref_rigid_body_pos,
      future_dif_local_rigid_body_pos,
      future_local_ref_body_pos_extend,
      # history,
      history_actor
    ]

    critic_obs: [
      base_lin_vel,
      base_ang_vel,
      projected_gravity,
      # base_quat,
      dof_pos,
      dof_vel,
      actions,
      # ref_motion_phase,
      # dif_local_rigid_body_pos,
      # local_ref_rigid_body_pos,
      future_dif_local_rigid_body_pos,
      future_local_ref_body_pos_extend,
      # dr_base_com,
      # dr_link_mass,
      # dr_kp,
      # dr_kd,
      # dr_friction,
      # dr_ctrl_delay,
      history_critic
    ]

    amp_obs: [
      history_amp
    ]

  obs_auxiliary: # define those coumpounds in obs_dict, for example, you can define different long/short history with different length

    history_actor: 
      base_ang_vel: ${obs.history_len}
      projected_gravity: ${obs.history_len}
      # base_quat: ${obs.history_len}
      dof_pos: ${obs.history_len}
      dof_vel: ${obs.history_len}
      history_dif_body_pos: ${obs.history_len}
      history_body_pos: ${obs.history_len}
      actions: ${obs.history_len}
      # ref_motion_phase: ${obs.history_len}
    

    history_critic: 
      base_lin_vel: ${obs.history_len}
      base_ang_vel: ${obs.history_len}
      projected_gravity: ${obs.history_len}
      # base_quat: ${obs.history_len}
      dof_pos: ${obs.history_len}
      dof_vel: ${obs.history_len}
      history_dif_body_pos: ${obs.history_len}
      history_body_pos: ${obs.history_len}
      actions: ${obs.history_len}
      # ref_motion_phase: ${obs.history_len}
    

    history_amp:
      root_height: ${obs.history_len_amp}
      dof_pos: ${obs.history_len_amp}
      local_body_pos: ${obs.history_len_amp}
      local_body_rot: ${obs.history_len_amp}
      local_body_vel: ${obs.history_len_amp}
      local_body_rot_vel: ${obs.history_len_amp}
    
  

  obs_scales: {
    base_lin_vel: 2.0,
    base_ang_vel: 0.25,
    projected_gravity: 1.0,
    base_quat: 1.0,
    dof_pos: 1.0,
    dof_vel: 0.05,
    actions: 1.0,
    root_height: 1.0,
    local_body_pos: 1.0,
    local_body_vel: 1.0,
    local_body_rot: 1.0,
    local_body_rot_vel: 1.0,
    dif_local_rigid_body_pos: 1.0,
    local_ref_rigid_body_pos: 1.0,
    # ref_motion_phase: 1.0,
    future_local_ref_body_pos_extend: 1.0,
    future_dif_local_rigid_body_pos: 1.0,
    history_actor: 1.0,
    history_critic: 1.0,
    history_amp: 1.0,
    dr_base_com: 1.0,
    dr_link_mass: 1.0,
    dr_kp: 1.0,
    dr_kd: 1.0,
    dr_friction: 1.0,
    dr_ctrl_delay: 1.0,
    history_dif_body_pos: 1.0,
    history_body_pos: 1.0,
  }

  noise_scales: {
    base_lin_vel: 0.2,
    base_ang_vel: 0.3,
    projected_gravity: 0.2,
    base_quat: 0.1,
    dof_pos: 0.01,
    dof_vel: 1.1,
    actions: 0.0,
    root_height: 0.0,
    local_body_pos: 0.0,
    local_body_vel: 0.0,
    local_body_rot: 0.0,
    local_body_rot_vel: 0.0,
    dif_local_rigid_body_pos: 0.05,
    local_ref_rigid_body_pos: 0.05,
    history_dif_body_pos: 0.05,
    history_body_pos: 0.05,
    # ref_motion_phase: 0.0,
    future_local_ref_body_pos_extend: 0.05,
    future_dif_local_rigid_body_pos: 0.05,
    history_actor: 0.0,
    history_critic: 0.0,
    history_amp: 0.0,
    dr_base_com: 0.0,
    dr_link_mass: 0.0,
    dr_kp: 0.0,
    dr_kd: 0.0,
    dr_friction: 0.0,
    dr_ctrl_delay: 0.0,
  }

  add_noise_currculum: True
  noise_initial_value: 0.1
  noise_value_max: 1.0
  noise_value_min: 0.05
  soft_dof_pos_curriculum_degree: 0.000003
  soft_dof_pos_curriculum_level_down_threshold: 0.2
  soft_dof_pos_curriculum_level_up_threshold: 0.95

  obs_dims:
    - base_lin_vel: 3
    - base_ang_vel: 3
    - projected_gravity: 3
    - base_quat: 4
    - dof_pos: ${robot.dof_obs_size}
    - dof_vel: ${robot.dof_obs_size}
    - actions: ${robot.dof_obs_size}
    - root_height: 1
    - local_body_pos: ${eval:'3 * ${robot.num_bodies} + 9'}
    - local_body_vel: ${eval:'3 * ${robot.num_bodies} + 9'}
    - local_body_rot: ${eval:'4 * ${robot.num_bodies} + 12'}
    - local_body_rot_vel: ${eval:'3 * ${robot.num_bodies} + 9'}
    - dif_local_rigid_body_pos: ${eval:'3 * ${robot.num_bodies} + 9'} # hardcoded for 3 extended body
    - local_ref_rigid_body_pos: ${eval:'3 * ${robot.num_bodies} + 9'}
    - history_dif_body_pos: ${eval:'3 * ${robot.num_bodies} + 9'}
    - history_body_pos: ${eval:'3 * ${robot.num_bodies} + 9'}
    - ref_motion_phase: 1
    - dr_base_com: 3
    - dr_link_mass: 22 # = num of 'randomize_link_body_names'
    - dr_kp: ${robot.dof_obs_size}
    - dr_kd: ${robot.dof_obs_size}
    - dr_friction: 1
    - dr_ctrl_delay: 1
    - future_local_ref_body_pos_extend: ${eval:'${obs.future_ref_steps} * (3 * ${robot.num_bodies} + 9)'}
    - future_dif_local_rigid_body_pos: ${eval:'${obs.future_ref_steps} * (3 * ${robot.num_bodies} + 9)'}
  post_compute_config: {} # Will store values after preprocessing, don't put anything here
  motion_len: -1
  future_ref_steps: 10
  history_len: 10
  history_len_amp: 10