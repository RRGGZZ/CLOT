# @package _global_

algo:
  _target_: humanoidverse.agents.mh_ppo_amp.mh_ppo_amp.AMP
  _recursive_: False
  config:
    num_learning_epochs: 5
    num_mini_batches: 4
    clip_param: 0.2
    gamma: 0.99
    lam: 0.95
    value_loss_coef: 1.0
    entropy_coef: 0.01
    l2c2:
      enable: False
      lambda_value: 1.0
      lambda_policy: 0.1

    actor_learning_rate: 1.e-3 # 5e-4 # 1.e-3
    critic_learning_rate: 1.e-3 # 5e-4 # 1.e-3
    discriminator_learning_rate: 1.e-4
    max_grad_norm: 1.0
    use_clipped_value_loss: True
    schedule: "adaptive"
    desired_kl: 0.01

    num_steps_per_env: 24
    save_interval: 1000
    logging_interval: 25

    load_optimizer: True

    init_noise_std: 0.8

    num_learning_iterations: 1000000
    init_at_random_ep_len: True
    eval_callbacks: null

    discriminator_weight_decay: 0.0001
    discriminator_logit_weight_decay: 0.01
    discriminator_batch_size: 4096
    discriminator_mini_batches: 2
    discriminator_reward_w: 0.05
    discriminator_grad_penalty: 5
    discriminator_replay_keep_prob: 0.01
    discriminator_replay_size: 100000
    discriminator_learning_epochs: 3

    phase_embed:
      type: Original # Original, Sinusoidal, SinusoidalV2, Learnable. See 'humanoidverse/agents/modules/ppo_modules.py' for details
      dim: 16 # if type==Original, not used
      # Other Idea: additive, concat, multiplicative, etc.

    module_dict:
      actor: 
        type: Transformer
        input_dim: [actor_obs]
        output_dim: [robot_action_dim]
        net_config:
          d_model: 192
          num_heads: 4
          d_ff: 768
          num_layers: 3
          max_seq_length: 200
      critic: 
        type: Transformer
        input_dim: [critic_obs]
        # output_dim: [1]
        output_dim: [num_rew_fn]
        net_config:
          d_model: 192
          num_heads: 4
          d_ff: 768
          num_layers: 3
          max_seq_length: 200

    discriminator:
          _target_: humanoidverse.agents.modules.amp_discriminator.Discriminator
          _recursive_: False
          num_out: 1
          config:
            obs_key: historical_self_obs
            input_dim_names: [amp_obs]
            normalize_obs: True
            norm_clamp_value: 5
            layers:
              - units: 1024
                activation: relu
                use_layer_norm: false
              - units: 1024
                activation: relu
                use_layer_norm: false
              - units: 1024
                activation: relu
                use_layer_norm: false
              - units: 1024
                activation: relu
                use_layer_norm: false